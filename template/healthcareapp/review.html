{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <!-- /////////////Bootstrap////////////////// -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css"
        integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
        <!-- /////////////Bootstrap Icon////////////////// -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <!-- /////////////google fonts/////////////// -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;1,300&display=swap"
        rel="stylesheet">
    <title>Edit Profile</title>
    <style>
        body {
            background-color: #1c2833;
        }

        *:focus {
            outline: none;
        }

        .topbar {
            background-color: teal;
            overflow: hidden;
        }

        .topbar a {
            float: right;
            color: whitesmoke;
            text-align: center;
            padding: 20px 26px;
            text-decoration: none;
            font-size: 15px;
        }

        .box {
            box-sizing: border-box;
            width: 200px;
            height: 200px;
            border: 2px solid #14af9f;
            box-shadow: -3px -3px 7px #ffffff73,
                3px 3px 5px rgba(94, 104, 121, 0.288);
            border-radius: 50%;
            background-color: black;
            margin-top: 20px;
            overflow: hidden;
            transition: all 1s;
        }

        img {
            box-sizing: border-box;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            margin: 0;
            border: 5px solid #14af9f;
            padding: 3px;
            background-color: white;
            transition: all 1s;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        textarea {

            display: block;
            box-sizing: border-box;
            background: none;
            color: #14af9f;
            margin-top: 10px;
            margin-bottom: 25px;
            padding: 4px;
            width: 300px;
            height: 32px;
            border: none;
            border-bottom: 1px solid #14af9f;
            font-family: 'Roboto', sans-serif;
            font-weight: 400;
            font-size: 15px;
            transition: 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type='number']:focus,
        textarea:focus{
            border-bottom: 2px solid #14af9f;
            border-bottom-right-radius: 20px;
            color: #14af9f;
            transition: 0.2 ease;
        }

        button[type='submit'] {
            border: 1px solid #14af9f;
            background-color: black;
            color: white;
            height: 30px;
            width: 100px;
            border-radius: 5px;
            margin: 0px;
            transition: all 0.3s;
        }

        button[type='submit'] {
            transform: scale(1.1);
        }

        input[type="file"] {
            display: none;
        }

        label {
            display: flex;
            justify-content: start;
            width: 300px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: black;
            color: white;
            border: 1px solid #14af9f;
            padding: 2px 15px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        label {
            background-color: #14af9f;
            color: black;
        }

        .box {
            width: 400px;
            height: auto;
            border-radius: 5px;
            padding: 20px;
        }

        .box img {
            width: 150px;
            height: 150px;
            /* margin: 20px 31%; */

        }
        button[type='button']{
            filter: invert(100%);
            background-color: transparent;
            border: none;
            padding: 0% 5px;
        }
        .patient_password{
            display: block;
            box-sizing: border-box;
            background: none;
            color: #14af9f;
            margin-bottom: 25px !important;
            padding: 4px;
            width: 300px !important;
            height: 32px !important;
            border: none;
            border-bottom: 1px solid #14af9f;
            font-family: 'Roboto', sans-serif;
            font-weight: 400;
            font-size: 15px !important;
            transition: 0.2s ease;
            margin-top: 0px !important;
        }
        .patient_password:focus{
            border-bottom: 2px solid #14af9f;
            border-bottom-right-radius: 20px !important;
            color: #14af9f;
            transition: 0.2 ease;
        }
        label{
            margin-top: 20px !important;
        }
    </style>
</head>

<body>
    <center>
        <div class="topbar">
            <a href="{% url 'logged_out' %}">logout</a>
            <a href="{% url 'patient_page' %}">Home</a>
        </div>
        {% if success %}
        <div class="alert alert-success w-25 mx-auto " role="alert">
            {{ success }}
        </div>
        {% endif %}
        {% if Error %}
        <div class="alert alert-danger w-25 mx-auto " role="alert">
            {{ Error }}
        </div>
        {% endif %}

        {% for review in revieww %}
        <div class="box d-flex flex-column">
            <img src="{% static 'img/dentl.png' %}" class="mx-auto my-2" alt="">
            <form action="{% url 'review_page'%}" name="edit_form" method="POST">
                
                {% csrf_token %}
                <div>
                    <label for="patient_name" class="">Patient name</label>
                    <input type="text" name="patient_name" placeholder="{{review.Your_Name}}" value="{{review.Your_Name}}" readonly {>
                </div>
                <div>
                    <label for="doctor_name" class="">Doctor name</label>
                    <input type="text" name="doctor_name" placeholder="{{review.Doctor.doc_name}}" value="{{review.Doctor.doc_name}}" readonly >
                </div>
                <div>
                    <label for="doctor_Post" class="">Doctor Post</label>
                    <input type="text" name="doctor_Post" placeholder="{{review.Doctor.doc_post}}" value="{{review.Doctor.doc_post}}" readonly >
                </div>
                <div>
                    <label for="doctor_rating" class="">Doctor rating</label>
                    <input type="number" name="doctor_rating" placeholder="Give the Star from 1 - 5"  >
                </div>
                <div>
                    <label for="doctor_review" class="">Doctor review</label>
                    <textarea type="text" name="doctor_review" class="text-capitalize" placeholder="Tell us Your Thoughts"></textarea>
                </div>
                <button type="submit" class="w-50 mx-auto" {% if success %} disabled {% endif %}>Update</button>
            </form>
        </div>
        {% endfor %}
    </center>

</html>
